name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync version from tag
        id: sync-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using release version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          RELEASE_VERSION="$VERSION" node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.RELEASE_VERSION;
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Tag must be a semver version, optionally prefixed with v. Got: ${version}`);
          }

          let changed = false;
          const readJson = (path) => JSON.parse(fs.readFileSync(path, "utf8"));
          const writeJson = (path, value) => {
            const next = `${JSON.stringify(value, null, 2)}\n`;
            const current = fs.existsSync(path) ? fs.readFileSync(path, "utf8") : "";
            if (current !== next) {
              fs.writeFileSync(path, next);
              changed = true;
            }
          };

          const manifest = readJson("manifest.json");
          manifest.version = version;
          writeJson("manifest.json", manifest);

          const packageJson = readJson("package.json");
          packageJson.version = version;
          writeJson("package.json", packageJson);

          const packageLock = readJson("package-lock.json");
          packageLock.version = version;
          packageLock.packages ??= {};
          packageLock.packages[""] ??= {};
          packageLock.packages[""].version = version;
          writeJson("package-lock.json", packageLock);

          const versions = readJson("versions.json");
          versions[version] = manifest.minAppVersion;
          writeJson("versions.json", versions);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          NODE
      - name: Commit synced version
        if: steps.sync-version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json package-lock.json versions.json
          git commit -m "Bump version to ${{ steps.sync-version.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
      - name: Version already synced
        if: steps.sync-version.outputs.changed != 'true'
        run: echo "Version files already match ${{ steps.sync-version.outputs.version }}"
      - run: npm test
      - run: npm run check
      - run: npm run build
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css
      - name: Create or update release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
