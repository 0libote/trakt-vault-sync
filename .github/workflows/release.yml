name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - name: Sync version from tag
        id: sync-version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          echo "Using release version $RELEASE_VERSION"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          RELEASE_VERSION="$RELEASE_VERSION" bun scripts/prepare-release.mjs
      - name: Commit synced version
        if: steps.sync-version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json versions.json
          git commit -m "Bump version to ${{ steps.sync-version.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
      - name: Version already synced
        if: steps.sync-version.outputs.changed != 'true'
        run: echo "Version files already match ${{ steps.sync-version.outputs.version }}"
      - run: bun run test
      - run: bun run check
      - run: bun run build
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js
      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css
      - name: Create or update release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
