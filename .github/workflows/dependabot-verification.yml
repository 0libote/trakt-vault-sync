name: Dependabot verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out pull request
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Audit production and development dependencies
        run: bun audit --audit-level=high
      - name: Run smoke tests
        run: bun run test
      - name: Run lint
        run: bun run lint
      - name: Build release bundle
        run: bun run build

  bot-review:
    if: always() && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Submit isolated GitHub Actions review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          set -euo pipefail
          if [ "$VERIFY_RESULT" = "success" ]; then
            body=$(printf '%s\n\n%s\n%s\n%s\n%s' \
              'Automated dependency code review: PASSED.' \
              "PR: $PR_TITLE" \
              'The frozen lockfile install, high-severity dependency audit, smoke tests, lint, and release build all passed.' \
              'The Dependabot compatibility score in the PR description remains the upstream bot risk indicator.' \
              'The verification job used a read-only token; this review job did not check out or execute pull-request code.')
          else
            verify_job_id=$(gh api "repos/$REPOSITORY/actions/runs/$RUN_ID/jobs" --jq '.jobs[] | select(.name == "verify") | .id' | head -n 1)
            failed_log=$(gh api "repos/$REPOSITORY/actions/jobs/$verify_job_id/logs" 2>&1 | tail -n 100 || true)
            body=$(printf '%s\n\n%s\n%s\n%s\n\n```text\n%s\n```' \
              'Automated dependency code review: BLOCKED.' \
              "PR: $PR_TITLE" \
              "Verification result: $VERIFY_RESULT. The failed-step output is included below." \
              'No pull-request code was executed with this review job’s write-enabled token.' \
              "$failed_log")
          fi
          gh pr review "$PR_URL" --comment --body "$body"
          test "$VERIFY_RESULT" = "success"
