name: Build and test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Validate release preparation
        env:
          RELEASE_VERSION: 9.9.9
        run: bun scripts/prepare-release.mjs
      - name: Verify release files
        run: test -s main.js && test -s manifest.json && test -s styles.css
