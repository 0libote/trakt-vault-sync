name: Apply dependency maintenance artifact

on:
  workflow_run:
    workflows: ["Generate dependency maintenance artifact"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve and validate originating Dependabot pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
        run: |
          set -euo pipefail
          test "$HEAD_REPOSITORY" = "$REPOSITORY"
          case "$HEAD_BRANCH" in
            dependabot/bun/typescript-7.0.2|dependabot/bun/types/node-26.1.1|dependabot/bun/eslint-plugin-obsidianmd-0.4.1|dependabot/bun/eslint-10.7.0) ;;
            *) exit 1 ;;
          esac
          owner=${REPOSITORY%%/*}
          pr_json=$(gh api "repos/$REPOSITORY/pulls?state=open&head=$owner:$HEAD_BRANCH" --jq '.[0]')
          test "$(jq -r '.user.login' <<<"$pr_json")" = 'dependabot[bot]'
          echo "number=$(jq -r '.number' <<<"$pr_json")" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title' <<<"$pr_json")" >> "$GITHUB_OUTPUT"
      - name: Download generated artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh run download "$RUN_ID" --repo "$REPOSITORY" --name "dependency-maintenance-$PR_NUMBER" --dir generated
      - name: Check out validated Dependabot branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
      - name: Validate artifact and update lockfile only
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
        run: |
          set -euo pipefail
          cmp package.json generated/package.json
          grep -Fq '"fast-uri": "3.1.2"' generated/package.json
          grep -Fq '"flatted": "3.4.2"' generated/package.json
          grep -Fq '"picomatch": "4.0.4"' generated/package.json
          grep -Fq '"fast-uri": ["fast-uri@3.1.2"' generated/bun.lock
          grep -Fq '"flatted": ["flatted@3.4.2"' generated/bun.lock
          grep -Fq '"picomatch": ["picomatch@4.0.4"' generated/bun.lock
          if [[ "$PR_TITLE" == *'typescript from 6.0.3 to 7.0.2'* ]]; then
            grep -Fq '"@typescript/native": "npm:typescript@7.0.2"' generated/package.json
            grep -Fq '"typescript": "6.0.3"' generated/package.json
            grep -Fq '"@typescript/native": ["typescript@7.0.2"' generated/bun.lock
            grep -Fq '"typescript": ["typescript@6.0.3"' generated/bun.lock
          fi
          cp generated/bun.lock bun.lock
      - name: Commit generated lockfile
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          git add bun.lock
          git diff --cached --quiet && exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore: regenerate reviewed dependency lockfile'
          git push origin "HEAD:$HEAD_BRANCH"
