name: Dependency maintenance

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  maintain:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Dependabot branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Apply trusted dependency maintenance
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (process.env.PR_TITLE.includes('typescript from 6.0.3 to 7.0.2')) {
            pkg.devDependencies ??= {};
            if (!pkg.devDependencies['@typescript/native']) {
              const current = pkg.devDependencies.typescript;
              if (!current || !String(current).includes('7.0.2')) {
                throw new Error(`Expected TypeScript 7.0.2 Dependabot branch, found ${current}`);
              }
              pkg.devDependencies['@typescript/native'] = 'npm:typescript@^7.0.2';
              pkg.devDependencies.typescript = 'npm:@typescript/typescript6@^6.0.3';
            }
          }
          if (pkg.overrides?.['fast-uri'] !== '3.1.2') {
            throw new Error('Expected trusted fast-uri 3.1.2 security override from the default branch');
          }
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          bun install --ignore-scripts
          bun install --frozen-lockfile --ignore-scripts
      - name: Push maintained manifest and lockfile
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git add package.json bun.lock
          git diff --cached --quiet && exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore: apply trusted dependency compatibility fixes'
          git push origin "HEAD:$HEAD_REF"
