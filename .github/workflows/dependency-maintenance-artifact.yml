name: Generate dependency maintenance artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  generate:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Generate trusted manifest and lockfile
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const expectedOverrides = {
            'fast-uri': '3.1.2',
            flatted: '3.4.2',
            picomatch: '4.0.4',
          };
          for (const [name, version] of Object.entries(expectedOverrides)) {
            if (pkg.overrides?.[name] !== version) {
              throw new Error(`Expected trusted ${name} ${version} security override from the default branch`);
            }
          }
          if (process.env.PR_TITLE.includes('typescript from 6.0.3 to 7.0.2')) {
            pkg.devDependencies['@typescript/native'] = 'npm:typescript@7.0.2';
            pkg.devDependencies.typescript = '6.0.3';
            pkg.scripts.build = 'node node_modules/@typescript/native/bin/tsc --noEmit --skipLibCheck && bun esbuild.config.mjs production';
          }
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          bun install --ignore-scripts
          bun install --frozen-lockfile --ignore-scripts
      - name: Upload reviewed manifest and lockfile
        uses: actions/upload-artifact@v4
        with:
          name: dependency-maintenance-${{ github.event.pull_request.number }}
          path: |
            package.json
            bun.lock
          if-no-files-found: error
          retention-days: 1
