name: Finalize Bun migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Generate Bun lockfile
        run: bun install --lockfile-only

      - name: Remove legacy lockfiles
        run: rm -f package-lock.json yarn.lock pnpm-lock.yaml bun.lockb

      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: generate Bun lockfile"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
