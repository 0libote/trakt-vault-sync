name: Apply verified plugin compatibility patch once

on:
  push:
    branches:
      - dependabot/bun/eslint-plugin-obsidianmd-0.4.1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor == '0libote'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Apply exact reviewed transformation
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/settings.ts')
          original = path.read_text(encoding='utf-8')
          if original.count('.setDestructive()') != 5:
              raise SystemExit('Expected exactly five reviewed setDestructive calls')
          path.write_text(original.replace('.setDestructive()', '.setWarning()'), encoding='utf-8')
          PY
      - name: Verify release
        run: |
          bun install --frozen-lockfile
          bun run verify
      - name: Commit verified source patch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git add src/settings.ts
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: preserve destructive button styling compatibility'
          git push origin "HEAD:$BRANCH"
